<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="description" content="Page not found. VP Ride — vpride.ca">
  <title>Page not found (404) · vpride.ca</title>
  <link rel="icon" type="image/png" href="/assets/app-icon.png" sizes="any">
  <link rel="apple-touch-icon" href="/assets/app-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffc300;
      --bg: #000000;
      --text: #f4f4f5;
      --muted: #9ca3af;
      --dim: #6b7280;
      --space: 1.25rem;
      --radius-pill: 999px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --font: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      min-height: 100dvh;
      min-height: 100svh;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 100% 65% at 50% 115%, rgba(255, 195, 0, 0.08) 0%, transparent 48%),
        radial-gradient(ellipse 55% 40% at 100% 0%, rgba(255, 195, 0, 0.04) 0%, transparent 42%),
        radial-gradient(ellipse 55% 40% at 0% 0%, rgba(255, 195, 0, 0.04) 0%, transparent 42%);
      -webkit-font-smoothing: antialiased;
    }

    a:focus-visible, .btn:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 3px;
    }

    .skip {
      position: absolute;
      left: 0.75rem;
      top: 0.75rem;
      z-index: 10;
      padding: 0.5rem 1rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--bg);
      background: var(--gold);
      border-radius: 0.375rem;
      text-decoration: none;
      transform: translateY(-200%);
      transition: transform 0.2s var(--ease);
    }
    .skip:focus { transform: translateY(0); }

    .wrap {
      min-height: 100dvh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding-left: max(var(--space), env(safe-area-inset-left));
      padding-right: max(var(--space), env(safe-area-inset-right));
      padding-top: max(2rem, env(safe-area-inset-top));
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 28rem;
      width: 100%;
      margin: 0 auto;
    }

    .code-wrap {
      position: relative;
      margin: 0 0 0.5rem;
    }

    .code {
      display: block;
      font-size: clamp(4.5rem, 16vw, 6.5rem);
      font-weight: 700;
      line-height: 0.9;
      letter-spacing: -0.06em;
      color: #1a1a1a;
      -webkit-text-stroke: 1.5px rgba(255, 195, 0, 0.55);
      text-shadow:
        0 0 40px rgba(255, 195, 0, 0.2),
        0 0 1px rgba(255, 195, 0, 0.4);
    }

    @supports not (-webkit-text-stroke: 1px red) {
      .code {
        color: rgba(255, 195, 0, 0.2);
        -webkit-text-stroke: 0;
        text-shadow: 0 0 32px rgba(255, 195, 0, 0.25);
      }
    }

    h1 {
      font-size: clamp(1.25rem, 4vw, 1.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0.75rem 0 0.75rem;
      color: var(--text);
    }

    .lede {
      margin: 0 0 1.75rem;
      font-size: 1rem;
      line-height: 1.6;
      font-weight: 500;
      color: var(--muted);
      max-width: 32ch;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.75rem;
      width: 100%;
      max-width: 18rem;
    }

    @media (min-width: 30rem) {
      .actions {
        flex-direction: row;
        justify-content: center;
        max-width: none;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.75rem;
      padding: 0.65rem 1.35rem;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: var(--radius-pill);
      transition: transform 0.2s var(--ease), background 0.2s ease, border-color 0.2s ease;
    }

    button.btn {
      appearance: none;
      margin: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .btn { transition: none; }
    }

    .btn--primary {
      color: #0c0c0c;
      background: linear-gradient(165deg, #ffe066 0%, var(--gold) 45%, #e6ae00 100%);
      border: 1px solid rgba(0,0,0,0.1);
      box-shadow: 0 1px 0 rgba(255,255,255,0.35) inset, 0 4px 20px rgba(0,0,0,0.25);
    }
    .btn--primary:hover { filter: brightness(1.04); }
    .btn--primary:active { filter: brightness(0.96); transform: scale(0.99); }

    .btn--ghost,
    button.btn--ghost {
      color: #d1d5db;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn--ghost:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 195, 0, 0.25);
    }

    .logo {
      display: block;
      width: 4.5rem;
      height: 4.5rem;
      margin: 0 auto 1.25rem;
      object-fit: contain;
      border-radius: 1rem;
      filter: drop-shadow(0 0.5rem 1.5rem rgba(255, 195, 0, 0.15));
    }

    .foot {
      text-align: center;
      font-size: 0.625rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 1.25rem;
    }

    @media (prefers-reduced-motion: no-preference) {
      .main { animation: in 0.5s var(--ease) both; }
    }
    @keyframes in {
      from { opacity: 0; transform: translateY(0.4rem); }
      to { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      .main { animation: none; }
    }
  </style>
</head>
<body>
  <a class="skip" href="#content">Skip to main content</a>
  <div class="wrap">
    <main id="content" class="main" tabindex="-1">
      <div class="code-wrap" aria-hidden="true">
        <span class="code">404</span>
      </div>
      <img class="logo" src="/assets/app-icon.png" width="120" height="120" alt="VP Ride" loading="eager" decoding="async">
      <h1>Page not found</h1>
      <p class="lede">This address isn&rsquo;t available. The page may have moved, or the link may be out of date.</p>
      <div class="actions">
        <a class="btn btn--primary" href="/">Back to home</a>
        <button type="button" class="btn btn--ghost" id="err-back" aria-label="Return to the previous page">Go back</button>
      </div>
    </main>
    <footer class="foot">
      <span>vpride.ca</span> · Error 404
    </footer>
  </div>
  <script>
    (function () {
      var b = document.getElementById("err-back");
      if (!b) return;
      b.addEventListener("click", function () {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = "/";
        }
      });
    })();
  </script>
</body>
</html>
