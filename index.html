<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#121212">
  <meta name="description" content="VP Ride is coming soon. Watch this space.">
  <title>VP Ride — Coming soon | vpride.ca</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ffc300;
      --bg: #121212;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text-muted: #a3a3a3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1.25rem 2.5rem;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      color: #fff;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 35%, rgba(255, 195, 0, 0.12), transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 100%, rgba(255, 195, 0, 0.06), transparent 50%);
    }

    .wrap {
      width: 100%;
      max-width: 32rem;
      text-align: center;
    }

    .logo {
      display: block;
      width: min(100%, 320px);
      height: auto;
      margin: 0 auto 2rem;
    }

    h1 {
      font-size: clamp(1.35rem, 4vw, 1.6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin: 0 0 0.75rem;
      color: #fff;
    }

    p.lead {
      margin: 0 0 1.5rem;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-muted);
      font-weight: 400;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--primary);
      background: rgba(255, 195, 0, 0.1);
      border: 1px solid rgba(255, 195, 0, 0.25);
    }

    .badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 0 0 rgba(255, 195, 0, 0.45);
      animation: pulse 2.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 195, 0, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(255, 195, 0, 0); }
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.25rem 1.25rem;
      font-size: 0.75rem;
      color: #666;
    }

    .footer-inner {
      max-width: 32rem;
      margin: 0 auto;
    }

    .domain {
      color: #888;
      font-weight: 600;
    }
  </style>
  <!--
    Deploy: from repo root, upload index.html, favicon.png, assets/ (and .htaccess on Apache). For launch, replace with your product landing.
  -->
</head>
<body>
  <div class="wrap" role="main">
    <img
      class="logo"
      src="assets/logo-horizontal.png"
      width="320"
      height="auto"
      alt="VP Ride"
    />
    <p class="lead">We&rsquo;re getting ready. New rides, same pride — the app and site are on the way.</p>
    <h1>Coming soon</h1>
    <div class="badge" aria-label="Status">Watch this space</div>
  </div>
  <footer class="footer">
    <div class="footer-inner">
      <span class="domain">vpride.ca</span> · &copy; <span id="y"></span> VP Ride. All rights reserved.
    </div>
  </footer>
  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
