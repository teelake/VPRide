<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="VP Ride is coming soon. Watch this space.">
  <title>VP Ride — Coming soon | vpride.ca</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ffc300;
      --ink: #000000;
      --line: rgba(255, 195, 0, 0.14);
      --text-dim: #9ca3af;
      --glow: rgba(255, 195, 0, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 4vw, 2.5rem) 1.25rem;
      padding-bottom: 4.5rem;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      color: #fff;
      /* Same true black as logo_horizontal_yellow_on_black artboard — no visible edge */
      background-color: var(--ink);
      background-image:
        /* Ambient light below content so it never tints the logo mark */
        radial-gradient(ellipse 100% 70% at 50% 108%, var(--glow) 0%, transparent 45%),
        radial-gradient(ellipse 50% 40% at 100% 0%, rgba(255, 195, 0, 0.04) 0%, transparent 45%),
        radial-gradient(ellipse 50% 40% at 0% 0%, rgba(255, 195, 0, 0.04) 0%, transparent 45%);
    }

    .wrap {
      width: 100%;
      max-width: 26rem;
      text-align: center;
    }

    .logo-glow {
      display: flex;
      justify-content: center;
      margin: 0 auto 1.75rem;
    }

    .logo {
      display: block;
      width: min(100%, 300px);
      height: auto;
      vertical-align: top;
      /* Subtle lift off pure black; reads “premium” without a grey box */
      filter: drop-shadow(0 12px 40px rgba(255, 195, 0, 0.15));
    }

    .rule {
      width: 3rem;
      height: 1px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(90deg, transparent, var(--line), transparent);
    }

    p.lead {
      margin: 0 0 1.25rem;
      font-size: clamp(0.9375rem, 2.8vw, 1.0625rem);
      line-height: 1.65;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.01em;
    }

    h1 {
      font-size: clamp(1.75rem, 5.5vw, 2.125rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin: 0 0 0.3rem;
      color: #fafafa;
    }

    .sub {
      margin: 0 0 1.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #6b7280;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.125rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--primary);
      background: linear-gradient(180deg, rgba(30, 30, 30, 0.9) 0%, rgba(10, 10, 10, 0.95) 100%);
      border: 1px solid rgba(255, 195, 0, 0.2);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.04) inset,
        0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 0 0 rgba(255, 195, 0, 0.5);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 195, 0, 0.4); }
      50% { box-shadow: 0 0 0 7px rgba(255, 195, 0, 0); }
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.25rem 1.5rem;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #4b5563;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
    }

    .footer-inner {
      max-width: 26rem;
      margin: 0 auto;
    }

    .domain {
      color: #6b7280;
      font-weight: 600;
    }
  </style>
  <!--
    Deploy: from repo root, upload index.html, favicon.png, assets/ (and .htaccess on Apache). For launch, replace with your product landing.
  -->
</head>
<body>
  <div class="wrap" role="main">
    <div class="logo-glow">
      <img
        class="logo"
        src="assets/logo-horizontal.png"
        width="300"
        height="auto"
        alt="VP Ride"
        decoding="async"
        fetchpriority="high"
      />
    </div>
    <div class="rule" aria-hidden="true"></div>
    <p class="lead">We&rsquo;re getting ready. New rides, same pride &mdash; the app and site are on the way.</p>
    <h1>Coming soon</h1>
    <p class="sub">A calmer, smarter way to move.</p>
    <div class="badge" aria-label="Status">Watch this space</div>
  </div>
  <footer class="footer">
    <div class="footer-inner">
      <span class="domain">vpride.ca</span> &nbsp;&middot;&nbsp; &copy; <span id="y"></span> VP Ride. All rights reserved.
    </div>
  </footer>
  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
